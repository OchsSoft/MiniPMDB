name: MiniPMDB Audit
description: Fail CI when governed project memory has unresolved quality violations.
author: OchsSoft
branding:
  icon: shield
  color: purple
inputs:
  snapshot:
    description: Path to a reviewed MiniPMDB snapshot v2 exported from MongoDB.
    required: true
  strict:
    description: Fail on warnings in addition to errors.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Audit governed memory
      shell: bash
      run: |
        args=(audit-snapshot --snapshot "${{ inputs.snapshot }}")
        if [ "${{ inputs.strict }}" = "true" ]; then
          args+=(--strict)
        fi
        node "$GITHUB_ACTION_PATH/src/cli.js" "${args[@]}"
